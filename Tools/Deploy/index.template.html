<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Lillist · Test Build</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f6f6f6;
            --fg: #0a0a0a;
            --muted: #6b6b6b;
            --accent: #2563eb;
            --accent-fg: #ffffff;
            --card-bg: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --fg: #f6f6f6;
                --muted: #9a9a9a;
                --accent: #3b82f6;
                --card-bg: #161616;
                --border: rgba(255, 255, 255, 0.08);
            }
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
        }
        main {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.06);
        }
        h1 {
            margin: 0 0 4px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin: 0 0 24px;
        }
        .meta {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 16px;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
        }
        .meta dt { font-weight: 500; }
        .meta dd { margin: 0; color: var(--fg); font-variant-numeric: tabular-nums; }
        .install {
            display: block;
            text-align: center;
            background: var(--accent);
            color: var(--accent-fg);
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .install:active { opacity: 0.85; }
        .note {
            font-size: 13px;
            color: var(--muted);
            margin: 0;
        }
        .note strong { color: var(--fg); }
        code {
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
            background: var(--border);
            padding: 1px 4px;
            border-radius: 4px;
            font-size: 0.92em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Lillist</h1>
        <p class="subtitle">Test build</p>

        <dl class="meta">
            <dt>Version</dt><dd>{{VERSION}}</dd>
            <dt>Commit</dt><dd><code>{{COMMIT}}</code></dd>
            <dt>Built</dt><dd>{{TIMESTAMP}}</dd>
        </dl>

        <a class="install" href="{{INSTALL_URL}}">Install</a>

        <p class="note">
            <strong>First install only:</strong> after tapping Install, iOS may
            warn that the developer is untrusted. Open
            <em>Settings → General → VPN &amp; Device Management</em>, tap your
            Apple Developer team, and trust it. Then re-tap Install above.
        </p>
    </main>
</body>
</html>
