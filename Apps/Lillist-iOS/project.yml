name: Lillist-iOS
options:
  bundleIdPrefix: app.lillist
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# Local-only signing values (DEVELOPMENT_TEAM) live in a gitignored
# xcconfig so they survive `xcodegen generate`. See ../Config/Signing.xcconfig.example.
configFiles:
  Debug: ../Config/Signing.xcconfig
  Release: ../Config/Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    # CURRENT_PROJECT_VERSION lives in Apps/Config/BuildNumber.xcconfig
    # (tracked, auto-incremented by the Archive pre-action). Keeping it
    # out of settings.base lets the xcconfig actually take effect —
    # project-level pbxproj settings outrank project xcconfig.
    #
    # MARKETING_VERSION mirrors the semver `VERSION` file (the Info.plist
    # uses $(MARKETING_VERSION)). It is kept in lockstep automatically by
    # the semver pre-bump hook .semver/hooks/pre-bump/sync-marketing-version.sh,
    # which rewrites this value and regenerates the pbxproj on every bump
    # (folded into the chore(release) commit, before deployit archives).
    # Don't hand-edit unless you're also moving VERSION. (A build-phase
    # auto-stamp was rejected: a post-build script can't write the product
    # Info.plist under ENABLE_USER_SCRIPT_SANDBOXING at archive time — see
    # docs/engineering-notes.md 2026-06-20.)
    MARKETING_VERSION: "0.18.0"
    DEAD_CODE_STRIPPING: YES
    # Xcode "recommended settings" (LastUpgradeCheck 2630): generate Swift
    # symbols for asset-catalog and string-catalog entries.
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # NB: Xcode also writes the resolved DEVELOPMENT_TEAM here — it is
    # intentionally NOT mirrored. The team ID lives behind
    # $(LOCAL_DEVELOPMENT_TEAM) in Config/Signing.xcconfig (see "Code signing"
    # in CLAUDE.md) so it never lands in the pbxproj / git. Regenerating
    # restores that indirection.

packages:
  LillistCore:
    path: ../../Packages/LillistCore
  LillistUI:
    path: ../../Packages/LillistUI
  LillistSearchIntelligence:
    path: ../../Packages/LillistSearchIntelligence
  # App-hosted glass snapshots: Liquid Glass only composites in a live
  # key window, which needs an app-hosted test bundle (see
  # docs/engineering-notes.md 2026-06-12). The standalone LillistUITests
  # bundle can't capture glass, so glass regression lives in
  # Lillist-iOSAppHostedTests, which pulls SnapshotTesting directly.
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Lillist-iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      - package: LillistSearchIntelligence
        product: LillistSearchIntelligence
      - target: ShareExtension-iOS
        embed: true
      - target: ShortcutsActions
        embed: true
      - target: LillistWidget
        embed: true
      # `appintentsmetadataprocessor` runs on every app/extension target by
      # default and warns when it can't find AppIntents.framework linked.
      # Linking the SDK explicitly silences the warning even when the
      # target has no `import AppIntents`; the processor then runs and
      # cleanly produces an empty `.appintents` bundle.
      - sdk: AppIntents.framework
      # WidgetKit for WidgetCenter.reloadTimelines (WidgetRefreshCoordinator).
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist
        PRODUCT_NAME: Lillist
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  ShareExtension-iOS:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ../../Extensions/ShareExtension-iOS
        excludes:
          - "Info.plist"
          - "Lillist.entitlements"
          - "Tests/**"
    dependencies:
      - package: LillistCore
        product: LillistCore
      # The share sheet adopts LillistUI (Rainbow theme + bundled
      # Plus Jakarta Sans registration). ~250KB of fonts + the static
      # lib is negligible against the extension memory ceiling.
      - package: LillistUI
        product: LillistUI
      # See note on Lillist-iOS target re: appintentsmetadataprocessor.
      - sdk: AppIntents.framework
      # WidgetKit: the share save reloads widget timelines (separate process).
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.Share
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ../../Extensions/ShareExtension-iOS/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ../../Extensions/ShareExtension-iOS/Info.plist

  ShortcutsActions:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ../../Extensions/ShortcutsActions
        excludes:
          - "Info.plist"
          - "Lillist.entitlements"
          - "Tests/**"
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistSearchIntelligence
        product: LillistSearchIntelligence
      # ShortcutsActions is the target that actually defines App Intents;
      # explicit linkage is more robust than relying on auto-link from
      # `import AppIntents`.
      - sdk: AppIntents.framework
      # WidgetKit: mutating intents reload widget timelines (separate process).
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.Shortcuts
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ../../Extensions/ShortcutsActions/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ../../Extensions/ShortcutsActions/Info.plist

  # WidgetKit extension — home-screen / Lock Screen widgets. Shares its
  # source with the macOS widget target via the top-level
  # Extensions/LillistWidget directory (see Apps/project.yml). Links
  # LillistCore (snapshot cache reader + intent handlers) and LillistUI
  # (Rainbow presentation views + bundled fonts). AppIntents + WidgetKit
  # are linked explicitly (config intent, interactive complete intent).
  LillistWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: ../../Extensions/LillistWidget
        excludes:
          - "Info.plist"
          - "Lillist.entitlements"
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      - sdk: AppIntents.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.Widget
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ../../Extensions/LillistWidget/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ../../Extensions/LillistWidget/Info.plist

  Lillist-iOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/IntegrationTests
      - path: Tests/UnitTests
      # Co-compile the SharePayload source so the tests can exercise its
      # decode() logic without needing a separate ShareExtension test
      # bundle. SharePayload has no UIKit-only behavior when initialised
      # with the `items:` test seam.
      - path: ../../Extensions/ShareExtension-iOS/SharePayload.swift
      # Co-compile the ShareSaveFlow pure helper so the create-then-attach
      # retry semantics of ShareRootView.save() can be unit-tested without
      # a signed ShareExtension test host.
      - path: ../../Extensions/ShareExtension-iOS/ShareSaveFlow.swift
      # Co-compile the ReportCrashIntent source so its resolver helper
      # can be exercised from the standalone iOS test bundle without
      # needing a ShortcutsActions extension test host.
      - path: ../../Extensions/ShortcutsActions/ReportCrashIntent.swift
      # Co-compile the AddTaskInput title normalizer so AddTaskIntent's
      # spoken-title handling can be unit-tested without a ShortcutsActions
      # extension test host (same pattern as ReportCrashIntent above).
      - path: ../../Extensions/ShortcutsActions/AddTaskInput.swift
      # Co-compile IntentSupport so the gate-aware persistence resolution
      # wrapper can be exercised from the standalone iOS test bundle without
      # a ShortcutsActions extension test host. The deep gate-branch coverage
      # lives in LillistCore's GatedPersistenceResolverTests; this pins the
      # iOS-side wrapper delegation.
      - path: ../../Extensions/ShortcutsActions/IntentSupport.swift
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.tests
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Standalone test bundle — no app test host, so headless xcodebuild
        # test works without a development signing identity. Mirrors Plan 7's
        # macOS test target choice and its lesson about iCloud / app-group
        # entitlements gating signed builds.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        # Test bundles still need an Info.plist; without a hosting app
        # to inherit one, auto-generate it.
        GENERATE_INFOPLIST_FILE: YES

  # UI-test target — the only way to verify the real `AppEnvironment.make()`
  # path (on-disk store, App Group, sandbox, signed host) actually
  # persists a task end-to-end. The standalone `Lillist-iOSTests` bundle
  # above cannot reach that code because it has no app host.
  Lillist-iOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/UITests
    dependencies:
      - target: Lillist-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.uitests
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: Lillist-iOS
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

  # App-hosted unit-test target (test-1). Unlike Lillist-iOSTests
  # (TEST_HOST=""), this bundle is hosted by Lillist-iOS, so
  # Bundle.main.bundleIdentifier is the app's real ID and the
  # liveSwapAllowed-gated migration/swap tests actually execute
  # instead of silently skipping. Co-compiles the gated LillistCore
  # test sources directly (they @testable-import LillistCore, which
  # the host app links).
  Lillist-iOSAppHostedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/AppHostedTests
        # Snapshot baselines are read from disk via #filePath, never from
        # the test bundle — keep the __Snapshots__ fixtures out of the
        # Resources build phase so the pbxproj carries no per-PNG churn
        # (otherwise every recorded baseline drifts the project file).
        excludes:
          - "**/__Snapshots__/**"
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Sync/MigrationCoordinatorTests.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Sync/CloudKitZoneEraserTests.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Sync/FakePersistenceReconfigurer.swift
      # FakeDiskSpaceProbe is referenced by MigrationCoordinatorTests'
      # disk-full pre-flight test (recovery-hardening); co-compile the
      # shared double so the app-hosted target builds.
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Persistence/FakeDiskSpaceProbe.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Persistence/PersistenceHostTests.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Persistence/StoreLevelModeSwapSpike.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Persistence/StoreReconfigureConcurrencyTests.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Sync/MigrationCoordinatorRestoreTests.swift
      - path: ../../Packages/LillistCore/Tests/LillistCoreTests/Helpers/FakeUserNotificationCenter.swift
    dependencies:
      - package: LillistCore
        product: LillistCore
      # LillistUI + SnapshotTesting power the app-hosted glass snapshot
      # suite (Tests/AppHostedTests/Glass*). This is the only test target
      # that can capture Liquid Glass (it has an app host → a live key
      # window for `drawHierarchyInKeyWindow`).
      - package: LillistUI
        product: LillistUI
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.appHostedTests
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lillist.app/Lillist"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

schemes:
  Lillist-iOS:
    build:
      targets:
        Lillist-iOS: all
        ShareExtension-iOS: all
        ShortcutsActions: all
        LillistWidget: all
        Lillist-iOSTests: [test]
        Lillist-iOSUITests: [test]
        Lillist-iOSAppHostedTests: [test]
    run:
      config: Debug
    archive:
      config: Debug
      preActions:
        # Bumps CFBundleVersion via Apps/Config/BuildNumber.xcconfig
        # before every Archive (Xcode UI or `xcodebuild archive`).
        # Pre-actions run with $PROJECT_DIR pointing at Apps/Lillist-iOS/.
        - script: |
            "$PROJECT_DIR/../../Tools/Deploy/bump-build-number.sh"
          name: Bump build number
          settingsTarget: Lillist-iOS
    test:
      config: Debug
      targets:
        - Lillist-iOSTests
        - Lillist-iOSUITests
        - Lillist-iOSAppHostedTests
        # SPM test bundle from Packages/LillistUI. Includes iOS-only
        # snapshot tests guarded by `#if os(iOS)` that compile out on
        # macOS hosts — wiring them into the iOS scheme is the only way
        # they actually run. See docs/engineering-notes.md (the
        # "scheme gap" entry) for the history.
        - package: LillistUI/LillistUITests
      environmentVariables:
        # Snapshot re-record switch. `$(RECORD_SNAPSHOTS)` expands from
        # xcodebuild's build settings, so
        #   xcodebuild test … RECORD_SNAPSHOTS=YES
        # reaches the test processes (plain env vars do NOT survive
        # xcodebuild — see engineering-notes). Read by
        # RecordableSnapshotTestCase; empty in normal runs.
        RECORD_SNAPSHOTS: $(RECORD_SNAPSHOTS)
