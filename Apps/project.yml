name: Lillist-macOS
options:
  bundleIdPrefix: io.mikeydotio
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# Local-only signing values (DEVELOPMENT_TEAM) live in a gitignored
# xcconfig so they survive `xcodegen generate`. See Config/Signing.xcconfig.example.
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    GENERATE_INFOPLIST_FILE: NO
    # Pre-stamp fallback only. The authoritative marketing version is
    # written into the built bundle at build time by the
    # StampMarketingVersion template (reads the repo `VERSION` file, the
    # semver source of truth). Kept current so the fallback isn't stale.
    MARKETING_VERSION: "0.8.5"

# Stamps the built bundle's CFBundleShortVersionString from the repo's
# semver `VERSION` file at build time, so the installed app's marketing
# version always tracks semver without hand-editing MARKETING_VERSION.
# Runs as a post-build phase (after Process Info.plist) and patches the
# product's own Info.plist in place. `inputFiles` declares VERSION so the
# script sandbox grants read access. NB: this spec's SRCROOT is `Apps/`,
# so VERSION is one level up (`../VERSION`), unlike the iOS spec.
targetTemplates:
  StampMarketingVersion:
    postBuildScripts:
      - name: Stamp marketing version from semver VERSION
        # Patches the product's already-processed Info.plist in place, so it
        # must NOT declare that plist as an output (that collides with
        # Xcode's own "Process Info.plist" task — "multiple commands
        # produce"). No outputs + basedOnDependencyAnalysis:false means it
        # runs every build, which is what we want (version always current).
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/../VERSION
        script: |
          set -euo pipefail
          version_file="${SRCROOT}/../VERSION"
          if [ ! -f "$version_file" ]; then
            echo "warning: VERSION not found at $version_file; leaving CFBundleShortVersionString unchanged"
            exit 0
          fi
          marketing="$(sed 's/^v//' "$version_file" | tr -d '[:space:]')"
          if [ -z "$marketing" ]; then
            echo "warning: VERSION is empty; leaving CFBundleShortVersionString unchanged"
            exit 0
          fi
          plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${marketing}" "$plist"
          echo "note: stamped CFBundleShortVersionString=${marketing} into ${plist}"

packages:
  LillistCore:
    path: ../Packages/LillistCore
  LillistUI:
    path: ../Packages/LillistUI
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Lillist-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    templates:
      - StampMarketingVersion
    sources:
      - path: Lillist-macOS/Sources
      - path: Lillist-macOS/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mikeydotio.Lillist
        PRODUCT_NAME: Lillist
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: Lillist-macOS/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Lillist-macOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      - package: Sparkle
        product: Sparkle
      # `appintentsmetadataprocessor` runs on every app/test target and
      # warns when AppIntents.framework isn't linked. The macOS app does
      # not currently define App Intents, but linking the SDK keeps the
      # processor silent and future-proofs adding an AppShortcutsProvider.
      - sdk: AppIntents.framework

  Lillist-macOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Lillist-macOS/Tests
      # Co-compile the HotkeyRecorder source so its pure `encode(...)`
      # helper is reachable from the standalone test bundle without a
      # signed app test host. Mirrors the SharePayload co-compile
      # pattern documented in docs/engineering-notes.md (Plan 8 entry).
      # HotkeyKeyTable backs HotkeyRecorder.keyName(for:) — Plan 12
      # Task 3 consolidated the keyCode↔keyName tables into one source
      # of truth, so the test bundle must co-compile both files.
      # GlobalHotkeyMonitor.parse is co-compiled (Plan 12 Task 4) so the
      # encode/parse round-trip test can call it directly without a
      # signed app test host.
      - path: Lillist-macOS/Sources/Hotkey/HotkeyRecorder.swift
      - path: Lillist-macOS/Sources/Hotkey/HotkeyKeyTable.swift
      - path: Lillist-macOS/Sources/Hotkey/GlobalHotkeyMonitor.swift
      # FocusedListColumn declares the standalone ListColumn enum + the
      # FocusedValueKey/extension; co-compiling it lets the focus gating
      # test reference ListColumn without pulling in RootSplitView's
      # AppEnvironment/sidebar dependencies (Plan 13 Task 5).
      - path: Lillist-macOS/Sources/Commands/FocusedListColumn.swift
      # macos-2: CommandNotifications declares the dependency-free
      # Notification.Name extension + the postedByCommands registry, so
      # CommandNotificationObserverGuardTests can read them without a
      # signed app test host.
      - path: Lillist-macOS/Sources/Commands/CommandNotifications.swift
      # EditorOpenDecision is pure value-math for the unified editor's
      # singleton rules (present / retarget / noop); co-compiled so
      # EditorOpenDecisionTests can assert them without a live NSPanel.
      - path: Lillist-macOS/Sources/Editor/EditorOpenDecision.swift
      # InlineCreateField is exercised by the empty-tab wiring guard in
      # InlineCreateInteractionTests (Plan 13 Task 6).
      - path: Lillist-macOS/Sources/Views/TaskList/InlineCreateField.swift
      # Plan 15 Task 2: ToolbarPersistenceTests exercises
      # UIStatePersistence.taskSelection(for:) which keys on
      # SidebarSelection. Co-compile both so the standalone bundle
      # builds without `@testable import Lillist_macOS`.
      - path: Lillist-macOS/Sources/Persistence/UIStatePersistence.swift
      - path: Lillist-macOS/Sources/Views/Sidebar/SidebarSelection.swift
      # Plan 15 Task 13: QuickCapturePlacementTests exercises
      # QuickCapturePanelController.placementOrigin(...). The whole
      # class compiles via its dependencies, so we keep the pure
      # math in a standalone helper file co-compiled alone.
      - path: Lillist-macOS/Sources/Hotkey/QuickCapturePlacementMath.swift
      # Plan 15 Task 24: IndexingServiceTests exercises
      # IndexingMappers.attributeSet(for:tagNames:) and
      # searchableItem(for:tagNames:). The helper is extracted from
      # IndexingService (whose AppEnvironment dependency would pull
      # in the entire app graph).
      - path: Lillist-macOS/Sources/Indexing/IndexingMappers.swift
      # Plan 19 Task 7: TaskListSourceTitleTests exercises
      # SourceTitleResolver.resolve(...). The resolver is extracted
      # from TaskListView (whose SwiftUI/AppEnvironment dependencies
      # would pull in the entire app graph).
      - path: Lillist-macOS/Sources/Views/TaskList/SourceTitleResolver.swift
      # Plan 19 Task 8: KeyboardShortcutTests exercises
      # SelectionAdvance.advance(current:ordered:direction:) — the pure
      # index-math used to document and regression-test SwiftUI's
      # built-in arrow-key navigation contract.
      - path: Lillist-macOS/Sources/Views/TaskList/SelectionAdvance.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mikeydotio.Lillist.tests
        # Standalone test bundle — no app test host, so the headless CLI
        # build works without a development signing identity. The tests
        # exercise LillistCore / LillistUI behaviors that back Plan 7's
        # interaction tests; they intentionally do not @testable-import
        # Lillist_macOS view types.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      # See note on Lillist-macOS target re: appintentsmetadataprocessor.
      - sdk: AppIntents.framework

schemes:
  Lillist-macOS:
    build:
      targets:
        Lillist-macOS: all
        Lillist-macOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Lillist-macOSTests
