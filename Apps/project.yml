name: Lillist-macOS
options:
  bundleIdPrefix: app.lillist
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# Local-only signing values (DEVELOPMENT_TEAM) live in a gitignored
# xcconfig so they survive `xcodegen generate`. See Config/Signing.xcconfig.example.
# Signing-macOS.xcconfig layers a dedicated, monotonic macOS build-number
# counter (BuildNumber-macOS.xcconfig) on top of the shared Signing.xcconfig
# (issue #55 — the macOS app previously hardcoded CFBundleVersion and never
# incremented it, so Sparkle could never detect a newer build).
configFiles:
  Debug: Config/Signing-macOS.xcconfig
  Release: Config/Signing-macOS.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    GENERATE_INFOPLIST_FILE: NO
    # Mirrors the semver `VERSION` file; the Info.plist uses
    # $(MARKETING_VERSION). Kept in lockstep automatically by the semver
    # pre-bump hook (.semver/hooks/pre-bump/sync-marketing-version.sh) — see
    # the note in Apps/Lillist-iOS/project.yml.
    MARKETING_VERSION: "0.17.0"

packages:
  LillistCore:
    path: ../Packages/LillistCore
  LillistUI:
    path: ../Packages/LillistUI
  LillistSearchIntelligence:
    path: ../Packages/LillistSearchIntelligence
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Lillist-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Lillist-macOS/Sources
      - path: Lillist-macOS/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist
        PRODUCT_NAME: Lillist
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: Lillist-macOS/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Lillist-macOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        # App Sandbox resource access configured in Xcode's Signing &
        # Capabilities: Calendars (Reminders import) + Location (location-based
        # tasks). Modern Xcode expresses these as build settings rather than raw
        # entitlements, so they must live here to survive `xcodegen generate`.
        # Scoped to the app only — the widget doesn't use them (Xcode also wrote
        # them onto LillistWidget-macOS, but an extension shouldn't request
        # unused sensitive resources).
        ENABLE_RESOURCE_ACCESS_CALENDARS: YES
        ENABLE_RESOURCE_ACCESS_LOCATION: YES
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      - package: LillistSearchIntelligence
        product: LillistSearchIntelligence
      - package: Sparkle
        product: Sparkle
      # `appintentsmetadataprocessor` runs on every app/test target and
      # warns when AppIntents.framework isn't linked. The macOS app does
      # not currently define App Intents, but linking the SDK keeps the
      # processor silent and future-proofs adding an AppShortcutsProvider.
      - sdk: AppIntents.framework
      # WidgetKit for WidgetCenter.reloadTimelines (WidgetRefreshCoordinator).
      - sdk: WidgetKit.framework
      - target: LillistWidget-macOS
        embed: true

  # WidgetKit extension (macOS) — Lillist's first macOS app-extension.
  # Shares source with the iOS widget via the top-level
  # Extensions/LillistWidget directory; Lock Screen accessory families are
  # `#if os(iOS)`-gated out. Supplies its own Info.plist because the project
  # base sets GENERATE_INFOPLIST_FILE: NO. Hardened runtime is inherited from
  # settings.base (required for Developer-ID notarization).
  LillistWidget-macOS:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ../Extensions/LillistWidget
        excludes:
          - "Info.plist"
          - "Lillist.entitlements"
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      - sdk: AppIntents.framework
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.Widget
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: ../Extensions/LillistWidget/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ../Extensions/LillistWidget/Info.plist
        # The shared widget Info.plist reads CFBundleVersion from
        # $(CURRENT_PROJECT_VERSION). No override needed here (issue #55
        # removed the old hardcoded literal): this target's configFiles come
        # from the project-level Signing-macOS.xcconfig, which resolves
        # CURRENT_PROJECT_VERSION from BuildNumber-macOS.xcconfig — the same
        # value the Lillist-macOS app target resolves — so the extension
        # stays in lockstep with its host automatically.

  Lillist-macOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Lillist-macOS/Tests
        # The XCUITest screenshot suite lives in Tests/UITests and belongs
        # ONLY to Lillist-macOSUITests — excluded here so it isn't swept into
        # this standalone (no-app-host) unit bundle, where XCUIApplication()
        # would assert "No target application path specified".
        excludes:
          - "UITests/**"
      # Co-compile the HotkeyRecorder source so its pure `encode(...)`
      # helper is reachable from the standalone test bundle without a
      # signed app test host. Mirrors the SharePayload co-compile
      # pattern documented in docs/engineering-notes.md (Plan 8 entry).
      # HotkeyKeyTable backs HotkeyRecorder.keyName(for:) — Plan 12
      # Task 3 consolidated the keyCode↔keyName tables into one source
      # of truth, so the test bundle must co-compile both files.
      # GlobalHotkeyMonitor.parse is co-compiled (Plan 12 Task 4) so the
      # encode/parse round-trip test can call it directly without a
      # signed app test host.
      - path: Lillist-macOS/Sources/Hotkey/HotkeyRecorder.swift
      - path: Lillist-macOS/Sources/Hotkey/HotkeyKeyTable.swift
      - path: Lillist-macOS/Sources/Hotkey/GlobalHotkeyMonitor.swift
      # macos-2: CommandNotifications declares the dependency-free
      # Notification.Name extension + the postedByCommands registry, so
      # CommandNotificationObserverGuardTests can read them without a
      # signed app test host.
      - path: Lillist-macOS/Sources/Commands/CommandNotifications.swift
      # EditorOpenDecision is pure value-math for the unified editor's
      # singleton rules (present / retarget / noop); co-compiled so
      # EditorOpenDecisionTests can assert them without a live NSPanel.
      - path: Lillist-macOS/Sources/Editor/EditorOpenDecision.swift
      # Plan 15 Task 13: QuickCapturePlacementTests exercises
      # QuickCapturePanelController.placementOrigin(...). The whole
      # class compiles via its dependencies, so we keep the pure
      # math in a standalone helper file co-compiled alone.
      - path: Lillist-macOS/Sources/Hotkey/QuickCapturePlacementMath.swift
      # Plan 15 Task 24: IndexingServiceTests exercises
      # IndexingMappers.attributeSet(for:tagNames:) and
      # searchableItem(for:tagNames:). The helper is extracted from
      # IndexingService (whose AppEnvironment dependency would pull
      # in the entire app graph).
      - path: Lillist-macOS/Sources/Indexing/IndexingMappers.swift
      # Issue #62: PreferencesPane is the enum-driven source of truth for the
      # Settings sidebar (title/systemImage per pane). Dependency-free, so
      # co-compiled here for PreferencesPaneTests to assert all 11 panes
      # without a signed app test host.
      - path: Lillist-macOS/Sources/Preferences/PreferencesPane.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.tests
        # Standalone test bundle — no app test host, so the headless CLI
        # build works without a development signing identity. The tests
        # exercise LillistCore / LillistUI behaviors that back Plan 7's
        # interaction tests; they intentionally do not @testable-import
        # Lillist_macOS view types.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        # The project base sets GENERATE_INFOPLIST_FILE: NO (the app supplies
        # its own Info.plist). A standalone test bundle has none, which is
        # fine when CI builds it unsigned (CODE_SIGNING_ALLOWED=NO). But once
        # the scheme also carries the signing-required Lillist-macOSUITests
        # target, a *signed* local `build-for-testing` signs every test
        # bundle — and code-signing needs an Info.plist. Generate one (the
        # iOS standalone bundle already does this).
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      # See note on Lillist-macOS target re: appintentsmetadataprocessor.
      - sdk: AppIntents.framework

  # UI-test target — hosts the real `Lillist-macOS` app so screenshots
  # capture the live SwiftUI window (Liquid Glass included). This is the
  # ONLY way to verify macOS glass: offscreen NSHostingView→image capture
  # blanks glass (see CLAUDE.md / engineering-notes), so the macOS glass
  # snapshot suites are XCTSkip-quarantined. Mirrors Lillist-iOSUITests.
  # Drives the `--ui-test-*` seams in LillistApp.swift. Runs locally on a
  # signed Mac (needs Config/Signing.xcconfig) — NOT in CI (no window
  # server).
  Lillist-macOSUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Lillist-macOS/Tests/UITests
    dependencies:
      - target: Lillist-macOS
      # Silences the appintentsmetadataprocessor "no AppIntents.framework"
      # warning that runs on every target — same rationale as the app +
      # unit-test targets above.
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lillist.uitests
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        TEST_TARGET_NAME: Lillist-macOS
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

schemes:
  Lillist-macOS:
    build:
      targets:
        Lillist-macOS: all
        LillistWidget-macOS: all
        Lillist-macOSTests: [test]
        Lillist-macOSUITests: [test]
    run:
      config: Debug
    archive:
      config: Debug
      preActions:
        # Bumps CFBundleVersion via Apps/Config/BuildNumber-macOS.xcconfig
        # before every Archive (Xcode UI or `xcodebuild archive`), mirroring
        # the Lillist-iOS scheme's pre-action. Fixes issue #55: without
        # this, macOS's CFBundleVersion never changed between releases and
        # Sparkle could never detect a newer build. Pre-actions run with
        # $PROJECT_DIR pointing at Apps/ (this project.yml's directory) —
        # one `..` to reach the repo root, unlike the iOS scheme's two.
        - script: |
            "$PROJECT_DIR/../Tools/Deploy/bump-build-number.sh" "$PROJECT_DIR/Config/BuildNumber-macOS.xcconfig"
          name: Bump build number
          settingsTarget: Lillist-macOS
    test:
      config: Debug
      targets:
        - Lillist-macOSTests
        - Lillist-macOSUITests
