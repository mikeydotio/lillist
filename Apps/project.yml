name: Lillist-macOS
options:
  bundleIdPrefix: io.mikeydotio
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    GENERATE_INFOPLIST_FILE: NO

packages:
  LillistCore:
    path: ../Packages/LillistCore
  LillistUI:
    path: ../Packages/LillistUI

targets:
  Lillist-macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Lillist-macOS/Sources
      - path: Lillist-macOS/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mikeydotio.Lillist
        PRODUCT_NAME: Lillist
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: Lillist-macOS/Lillist.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Lillist-macOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      # `appintentsmetadataprocessor` runs on every app/test target and
      # warns when AppIntents.framework isn't linked. The macOS app does
      # not currently define App Intents, but linking the SDK keeps the
      # processor silent and future-proofs adding an AppShortcutsProvider.
      - sdk: AppIntents.framework

  Lillist-macOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Lillist-macOS/Tests
      # Co-compile the HotkeyRecorder source so its pure `encode(...)`
      # helper is reachable from the standalone test bundle without a
      # signed app test host. Mirrors the SharePayload co-compile
      # pattern documented in docs/engineering-notes.md (Plan 8 entry).
      # HotkeyKeyTable backs HotkeyRecorder.keyName(for:) — Plan 12
      # Task 3 consolidated the keyCode↔keyName tables into one source
      # of truth, so the test bundle must co-compile both files.
      # GlobalHotkeyMonitor.parse is co-compiled (Plan 12 Task 4) so the
      # encode/parse round-trip test can call it directly without a
      # signed app test host.
      - path: Lillist-macOS/Sources/Hotkey/HotkeyRecorder.swift
      - path: Lillist-macOS/Sources/Hotkey/HotkeyKeyTable.swift
      - path: Lillist-macOS/Sources/Hotkey/GlobalHotkeyMonitor.swift
      # FocusedListColumn declares the standalone ListColumn enum + the
      # FocusedValueKey/extension; co-compiling it lets the focus gating
      # test reference ListColumn without pulling in RootSplitView's
      # AppEnvironment/sidebar dependencies (Plan 13 Task 5).
      - path: Lillist-macOS/Sources/Commands/FocusedListColumn.swift
      # InlineCreateField is exercised by the empty-tab wiring guard in
      # InlineCreateInteractionTests (Plan 13 Task 6).
      - path: Lillist-macOS/Sources/Views/TaskList/InlineCreateField.swift
      # Plan 15 Task 2: ToolbarPersistenceTests exercises
      # UIStatePersistence.taskSelection(for:) which keys on
      # SidebarSelection. Co-compile both so the standalone bundle
      # builds without `@testable import Lillist_macOS`.
      - path: Lillist-macOS/Sources/Persistence/UIStatePersistence.swift
      - path: Lillist-macOS/Sources/Views/Sidebar/SidebarSelection.swift
      # Plan 15 Task 13: QuickCapturePlacementTests exercises
      # QuickCapturePanelController.placementOrigin(...). The whole
      # class compiles via its dependencies, so we keep the pure
      # math in a standalone helper file co-compiled alone.
      - path: Lillist-macOS/Sources/Hotkey/QuickCapturePlacementMath.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mikeydotio.Lillist.tests
        # Standalone test bundle — no app test host, so the headless CLI
        # build works without a development signing identity. The tests
        # exercise LillistCore / LillistUI behaviors that back Plan 7's
        # interaction tests; they intentionally do not @testable-import
        # Lillist_macOS view types.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies:
      - package: LillistCore
        product: LillistCore
      - package: LillistUI
        product: LillistUI
      # See note on Lillist-macOS target re: appintentsmetadataprocessor.
      - sdk: AppIntents.framework

schemes:
  Lillist-macOS:
    build:
      targets:
        Lillist-macOS: all
        Lillist-macOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Lillist-macOSTests
